version: "3.9"

services:
  smart-order-bot:
    build: .
    container_name: smart-order-bot
    restart: unless-stopped
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_PATH: /data/smart_order.db
      TZ: Asia/Almaty
    volumes:
      - smart_order_data:/data

  smart-order-admin:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: smart-order-admin
    restart: unless-stopped
    environment:
      DB_PATH: /data/smart_order.db
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      BOT_TOKEN: ${BOT_TOKEN}
      TZ: Asia/Almaty
    expose:
      - "8501"
    volumes:
      - smart_order_data:/data
    depends_on:
      - smart-order-bot

  smart-order-nginx:
    image: nginx:1.27-alpine
    container_name: smart-order-nginx
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      TZ: Asia/Almaty
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_webroot:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt:ro
    depends_on:
      - smart-order-admin

  smart-order-certbot:
    image: certbot/certbot:latest
    container_name: smart-order-certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/certbot
      - letsencrypt_data:/etc/letsencrypt
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :; do
      certbot renew --webroot -w /var/www/certbot --quiet;
      sleep 12h & wait $${!};
      done"

volumes:
  smart_order_data:
  certbot_webroot:
  letsencrypt_data:
